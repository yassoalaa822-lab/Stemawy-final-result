<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Science — First Semester</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Light theme variables */
        :root[data-theme="light"] {
            --tech-bg: #ffffff;
            --tech-dark-alt: #f3f4f6;
            --tech-light: #111827;
            --tech-primary: #0369a1;
            --tech-secondary: #0e7490;
            --border-color: rgba(2, 132, 199, 0.3);
        }

        /* Dark theme variables (default) */
        :root[data-theme="dark"] {
            --tech-bg: #1A1F26;
            --tech-dark-alt: #2C333F;
            --tech-light: #E0E6F0;
            --tech-primary: #00BFFF;
            --tech-secondary: #33FFCC;
            --border-color: rgba(51, 255, 204, 0.3);
        }

        /* Space Theme Variables */
        :root[data-theme="space"] {
            --tech-bg: #050505;
            --tech-dark-alt: #0F1218;
            --tech-light: #ffffff;
            --tech-primary: #00BFFF;
            --tech-secondary: #33FFCC;
            --border-color: rgba(0, 191, 255, 0.3);
        }

        /* Midnight Synth Theme */
        :root[data-theme="midnight"] {
            --tech-bg: #1e1b4b;
            --tech-dark-alt: #312e81;
            --tech-light: #e0e7ff;
            --tech-primary: #f472b6;
            --tech-secondary: #818cf8;
            --border-color: rgba(244, 114, 182, 0.4);
        }

        /* Christmas Theme */
        :root[data-theme="christmas"] {
            --tech-bg: #2C0412;
            --tech-dark-alt: #460B1C;
            --tech-light: #FEEBC8;
            --tech-primary: #D4AF37;
            --tech-secondary: #228B22;
            --border-color: rgba(212, 175, 55, 0.4);
        }

        body,
        .bg-tech-bg {
            background-color: var(--tech-bg) !important;
        }

        .bg-tech-dark-alt {
            background-color: var(--tech-dark-alt) !important;
        }

        .text-tech-light {
            color: var(--tech-light) !important;
        }

        .text-tech-primary {
            color: var(--tech-primary) !important;
        }

        .text-tech-secondary {
            color: var(--tech-secondary) !important;
        }

        .border-tech-dark-alt {
            border-color: var(--tech-dark-alt) !important;
        }

        .border-tech-primary {
            border-color: var(--tech-primary) !important;
        }

        .border-tech-secondary {
            border-color: var(--tech-secondary) !important;
        }

        .shadow-subtle-glow {
            box-shadow: 0 4px 15px var(--tech-primary, #00BFFF)25, 0 0 5px var(--tech-primary, #00BFFF)10;
            transition: all 0.3s ease-in-out;
        }

        .hover\:shadow-subtle-glow-lg:hover {
            box-shadow: 0 6px 20px var(--tech-primary, #00BFFF)40, 0 0 8px var(--tech-primary, #00BFFF)20;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .gradient-text-wrapper {
            display: inline-block;
            background-size: 300% 100%;
            animation: gradient-shift 8s linear infinite;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            white-space: nowrap;
        }

        .gradient-h1 {
            background-image: linear-gradient(to right, var(--tech-primary), var(--tech-secondary), var(--tech-primary), var(--tech-secondary));
            animation-duration: 8s;
        }

        #content-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--tech-primary) var(--tech-bg);
        }

        #content-area::-webkit-scrollbar {
            width: 8px;
        }

        #content-area::-webkit-scrollbar-thumb {
            background-color: var(--tech-primary);
            border-radius: 4px;
        }

        #content-area::-webkit-scrollbar-track {
            background-color: var(--tech-bg);
        }

        .lo-item.active {
            background-color: var(--tech-primary)33;
            border-left-color: var(--tech-secondary);
            box-shadow: 0 0 10px var(--tech-secondary)30;
        }

        details summary .arrow-icon {
            transform: rotate(0deg);
            transition: transform 0.3s;
        }

        details[open] summary .arrow-icon {
            transform: rotate(90deg);
        }

        /* Theme toggle button */
        .theme-toggle {
            padding: 0.5rem;
            border-radius: 9999px;
            transition: all 0.3s ease;
            color: var(--tech-light);
        }

        .theme-toggle:hover {
            background-color: var(--tech-primary);
            color: var(--tech-bg);
        }

        /* Enforce CSS Variables */
        .bg-tech-dark-alt {
            background-color: var(--tech-bg) !important;
        }

        .bg-tech-dark-alt {
            background-color: var(--tech-dark-alt) !important;
        }

        .text-tech-light {
            color: var(--tech-light) !important;
        }

        .text-tech-primary {
            color: var(--tech-primary) !important;
        }

        .text-tech-secondary {
            color: var(--tech-secondary) !important;
        }

        .border-tech-primary {
            border-color: var(--tech-primary) !important;
        }

        .border-tech-secondary {
            border-color: var(--tech-secondary) !important;
        }

        /* Christmas Theme */
        :root[data-theme="christmas"] {
            --tech-bg: #2C0412;
            --tech-dark-alt: #460B1C;
            --tech-light: #FDF5E6;
            --tech-primary: #FFD700;
            --tech-secondary: #006400;
            --border-color: rgba(255, 215, 0, 0.4);
        }

        /* Snow */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }

        :root[data-theme="christmas"] #snow-container {
            display: block;
        }

        .snowflake {
            position: absolute;
            top: -10px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

        /* RTL */
        [dir="rtl"] {
            font-family: 'Tajawal', 'Inter', sans-serif;
        }

        [dir="rtl"] .text-right-rtl {
            text-align: right;
        }

        [dir="rtl"] #sidebar {
            border-left: 1px solid var(--tech-primary);
            border-right: none;
            margin-left: 1.5rem;
            margin-right: 0;
        }

        #settings-modal {
            backdrop-filter: blur(5px);
        }

        /* --- Dark Neon Dynamic Background --- */
        .cyber-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            display: none;
        }

        /* Only show in Dark Theme */
        :root[data-theme="dark"] .cyber-wrapper {
            display: block;
        }

        .cyber-grid {
            position: absolute;
            width: 200vw;
            height: 200vh;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(rgba(0, 191, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 191, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(60px);
            }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float-orb 20s infinite ease-in-out;
        }

        .orb-1 {
            top: 20%;
            left: 20%;
            width: 300px;
            height: 300px;
            background: rgba(0, 191, 255, 0.3);
            animation-duration: 25s;
        }

        .orb-2 {
            bottom: 20%;
            right: 20%;
            width: 400px;
            height: 400px;
            background: rgba(51, 255, 204, 0.2);
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .orb-3 {
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: rgba(138, 43, 226, 0.15);
            animation-duration: 20s;
            animation-delay: -10s;
        }

        @keyframes float-orb {

            0%,
            100% {
                transform: translate(0, 0);
            }

            33% {
                transform: translate(40px, -60px);
            }

            66% {
                transform: translate(-30px, 30px);
            }
        }

        /* Breathing Glow for Cards in Dark Mode */
        :root[data-theme="dark"] .subject-card,
        :root[data-theme="dark"] .comp-card,
        :root[data-theme="dark"] .lo-item,
        :root[data-theme="dark"] details {
            animation: breathing-glow 5s ease-in-out infinite;
        }

        :root[data-theme="dark"] .subject-card:hover,
        :root[data-theme="dark"] .comp-card:hover,
        :root[data-theme="dark"] .lo-item:hover,
        :root[data-theme="dark"] details[open] {
            animation: none;
        }

        @keyframes breathing-glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(0, 191, 255, 0.05);
                border-color: rgba(0, 191, 255, 0.1);
            }

            50% {
                box-shadow: 0 0 15px rgba(51, 255, 204, 0.15);
                border-color: rgba(51, 255, 204, 0.3);
            }
        }

        /* Space Theme Variables */
        :root[data-theme="space"] {
            --tech-bg: #050505;
            --tech-dark-alt: #0F1218;
            --tech-light: #ffffff;
            --tech-primary: #00BFFF;
            --tech-secondary: #33FFCC;
            --border-color: rgba(0, 191, 255, 0.3);
        }

        /* Midnight Synth Theme */
        :root[data-theme="midnight"] {
            --tech-bg: #1e1b4b;
            --tech-dark-alt: #312e81;
            --tech-light: #e0e7ff;
            --tech-primary: #f472b6;
            --tech-secondary: #818cf8;
            --border-color: rgba(244, 114, 182, 0.4);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { 'tech-bg': '#1A1F26', 'tech-dark-alt': '#2C333F', 'tech-light': '#E0E6F0', 'tech-primary': '#00BFFF', 'tech-secondary': '#33FFCC', } } } };
        // Computer Science learning objectives and concepts
        const learningObjectives = {
            LO1: {
                title: "LO1: SketchUp & 3D Design",
                concepts: [
                    "Sketch up structure, tools, and styles",
                    "3D design",
                    "orbit, pan, command bar, large tool set",
                    "Style, toolbox, tray"
                ]
            },
            LO2: {
                title: "LO2: Machine Language & Number Systems",
                concepts: [
                    "machine language data, digit, bit, byte. Word, Nibble Decimal number system Binary system Octal and Hexadecimal Systems"
                ]
            },
            LO3: {
                title: "LO3: Networks & Administration",
                concepts: [
                    "LAN",
                    "WAN",
                    "Peer-to-Peer Networks",
                    "System administrator task"
                ]
            },
            LO4: {
                title: "LO4: Programming & Problem Solving",
                concepts: [
                    "Computer programming Problem solving Well-defined problem.",
                    "Algorithm.",
                    "Flowcharts (Flowchart symbols).",
                    "Pseudo-code sequencing – conditional Loop"
                ]
            },
            LO5: {
                title: "LO5: HTML & Web Fundamentals",
                concepts: [
                    "HTML - Elements /Tags (Start – End).",
                    "HTML Documents.",
                    "HTML Headings.",
                    "HTML Links.",
                    "HTML Images.",
                    "HTML Lists.",
                    "Attributes.",
                    "The div element.",
                    "Web addresses.",
                    "HTML Form Elements.",
                    "HTML Multimedia (sound, music, videos, movies, and animations).",
                    "HTML5"
                ]
            },
            LO6: {
                title: "LO6: CSS & Styling",
                concepts: [
                    "CSS term.",
                    "Style attribute / Style element",
                    "Inline styles / Multiple styles.",
                    "CSS syntax (Selector - Rules).",
                    "Selectors (Type - Class and ID).",
                    "External CCS file.",
                    "Boxes (Content – Padding – Border - Margin).",
                    "Style sheet or style element — not both!",
                    "CSS colors."
                ]
            },
            'revision': {
                title: "Revision",
                concepts: []
            }
        };
        // File lists for each LO and test banks
        const files = {
            LO1: [
                "first semester/LO1/sketchup-tools3.png",
                "first semester/LO1/Sketchup-Tools2.jpg",
                "first semester/LO1/Sketchup-LargeToolSet.jpg",
                "first semester/LO1/SketchUp-Keyring-Tutorial.pdf",
                "first semester/LO1/Sketchup-Interface1.pdf"
            ],
            LO2: [
                "first semester/LO2/number system1.pdf"
            ],
            LO3: [
                "first semester/LO3/شرح أجهزة الشبكات والفرق بين اله...mp4",
                "first semester/LO3/Networks.wmv",
                "first semester/LO3/Networks.mp4",
                "first semester/LO3/NetworkBasics1.ppt",
                "first semester/LO3/Network-topology1.pdf",
                "first semester/LO3/Network-LO3.pptx"
            ],
            LO4: [
                "first semester/LO4/Problem Solving.pdf",
                "first semester/LO4/Problem Solving(LO4).pdf"
            ],
            LO5: [
                "first semester/LO5/HTML5Reference.pdf",
                "first semester/LO5/HTML.pdf",
                "first semester/LO5/html-tags-chart.pdf",
                "first semester/LO5/HTML Tutorial.pdf",
                "first semester/LO5/html-tags-chart.pdf"
            ],
            LO6: [
                "first semester/LO6/Introduction-to-CSS-LO6.pdf"
            ],
            revision: [
                "first semester/Revision/ExcelReaderAdvanced-ClaudeChat1.docx",
                "first semester/Revision/Flowcharts-Revision1.pdf",
                "first semester/Revision/Flowcharts-Revision1.docx",
                "first semester/Revision/CSS-Revision1.pdf",
                "first semester/Revision/CSS-Revision1.docx",
                "first semester/Revision/CSS-mcq-1.pdf",
                "first semester/Revision/CSS-mcq-1.docx",
                "first semester/Revision/css-basics-quiz01.docx",
                "first semester/Revision/CSS quiz1.docx",
                "first semester/Revision/CS-midterm-Dec21.docx",
                "first semester/Revision/networkmcq2.docx",
                "first semester/Revision/networkmcq2_OCR.pdf",
                "first semester/Revision/networkmcq2.pdf",
                "first semester/Revision/networkmcq.pdf",
                "first semester/Revision/networkmcq.docx",
                "first semester/Revision/MCQs  flowcharts.docx",
                "first semester/Revision/mcqNetworking1.docx",
                "first semester/Revision/MCQ -HTML.docx",
                "first semester/Revision/JavaScript MCQ.docx",
                "first semester/Revision/html-quiz-HardLevel01.docx"
                // ...existing files from Revision folder
            ]
        };
        // Mapping filename -> shareUrl for CS files
        const shareMap = {
            "SketchUp-Keyring-Tutorial.pdf": "https://drive.google.com/file/d/1QGsspE3J0z8zZ0M99pJIT7nRj-Q-7FAa/view?usp=drivesdk",
            "Sketchup-Interface1.pdf": "https://drive.google.com/file/d/1d6DXGmKPbdhq-5sVi4Fs_tT9LHm979aj/view?usp=drivesdk",
            "number system1.pdf": "https://drive.google.com/file/d/1sKCzvwQpBf71pcuaHs8Nfyo3IaDsqHnG/view?usp=drivesdk",
            "Network-LO3.pptx": "https://docs.google.com/presentation/d/1EBD6L3WnIOuUmuCA-fQm_GzufKxV6Z-i/edit?usp=drivesdk&ouid=101563598129890605704&rtpof=true&sd=true",
            "HTML5Reference.pdf": "https://drive.google.com/file/d/17sqYrLPPeFwuPyodmwTY7T2W3qGmmhen/view?usp=drivesdk",
            "Introduction-to-CSS-LO6.pdf": "https://drive.google.com/file/d/1TQBHuOnogUNWvvd4migvfbxr0PoJTGQE/view?usp=drivesdk"
        };
        // Function to create a downloadable file link
        function createFileLinks(fileArr) {
            if (!fileArr || fileArr.length === 0) return '<p class="text-tech-light/70 italic">No files available.</p>';
            return fileArr.map(f => {
                const fname = f.split('/').pop();
                const url = shareMap[fname] || f;
                return `<div class="mb-2"><a href="${url}" target="_blank" rel="noopener noreferrer" class="text-tech-primary hover:text-tech-secondary underline">${fname}</a></div>`;
            }).join('');
        }
        // Function to render concept content
        function renderConcept(conceptTitle) {
            return `
                <details class="mb-4 bg-tech-dark-alt rounded-xl border border-tech-primary/30 shadow-lg overflow-hidden">
                    <summary class="flex items-center justify-between p-4 cursor-pointer text-lg font-semibold text-tech-light hover:bg-tech-primary/20 transition duration-300">
                        <span class="truncate">${conceptTitle}</span>
                        <svg class="w-5 h-5 ml-2 transition-transform duration-300 arrow-icon flex-shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </summary>
                    <div class="px-4 pb-4 pt-2 border-t border-tech-primary/30 space-y-4">
                        <div class="bg-tech-dark-alt/80 p-3 rounded-lg border border-tech-dark-alt">
                            <h4 class="text-md font-bold text-tech-secondary mb-1">Concept Description</h4>
                            <p class="text-tech-light/90 text-sm">Description and presentation for <b>${conceptTitle}</b>.</p>
                        </div>
                    </div>
                </details>
            `;
        }
        // Function to render LO content
        function renderLO(loKey, loData) {
            let html = `<h2 class="text-3xl font-extrabold mb-6 text-tech-primary border-b border-tech-secondary/50 pb-2">${loData.title}</h2>`;
            loData.concepts.forEach(concept => { html += renderConcept(concept); });
            html += `<div class="mt-6"><h3 class="text-xl font-bold text-tech-secondary mb-2">Files</h3>${createFileLinks(files[loKey])}</div>`;
            return html;
        }
        // Function to render Test Banks section
        // Function to render Revision section
        function renderRevision() {
            return `<h2 class="text-3xl font-extrabold mb-6 text-tech-primary border-b border-tech-secondary/50 pb-2">Revision</h2><div class="mt-6">${createFileLinks(files.revision)}</div>`;
        }
        // Navigation and content rendering
        function handleNavigationClick(loKey) {
            const contentArea = document.getElementById('dynamic-content');
            const defaultMessage = document.getElementById('default-message');
            const loItems = document.querySelectorAll('.lo-item');
            loItems.forEach(item => item.classList.remove('active'));
            const target = document.getElementById(`lo-${loKey}`);
            if (target) target.classList.add('active');
            if (defaultMessage) defaultMessage.style.display = 'none';
            if (loKey === 'revision') contentArea.innerHTML = renderRevision();
            else if (learningObjectives[loKey]) contentArea.innerHTML = renderLO(loKey, learningObjectives[loKey]);
            else contentArea.innerHTML = `<h2 class="text-red-400">Error: Section not found.</h2>`;
            document.getElementById('content-area').scrollTop = 0;
        }
        // Theme toggle logic
        function setTheme(mode) {
            localStorage.setItem('theme', mode);
            updateThemeIcon(mode);
            if (mode === 'dark') {
                document.body.classList.add('dark');
                document.documentElement.classList.add('dark');
                document.body.style.backgroundColor = 'var(--tech-bg)';
                document.documentElement.style.setProperty('--tech-bg', '#1A1F26');
                document.documentElement.style.setProperty('--tech-dark-alt', '#2C333F');
                document.documentElement.style.setProperty('--tech-light', '#E0E6F0');
                document.documentElement.style.setProperty('--tech-primary', '#00BFFF');
                document.documentElement.style.setProperty('--tech-secondary', '#33FFCC');
            } else {
                document.body.classList.remove('dark');
                document.documentElement.classList.remove('dark');
                document.body.style.backgroundColor = '#fff';
                document.documentElement.style.setProperty('--tech-bg', '#fff');
                document.documentElement.style.setProperty('--tech-dark-alt', '#f3f4f6');
                document.documentElement.style.setProperty('--tech-light', '#222');
                document.documentElement.style.setProperty('--tech-primary', '#0074D9');
                document.documentElement.style.setProperty('--tech-secondary', '#2ECC40');
            }
        }
        function updateThemeIcon(mode) {
            const btn = document.getElementById('theme-toggle-btn');
            if (!btn) return;
            if (mode === 'christmas') {
                btn.innerHTML = '<span style="font-size: 1.25rem; line-height: 1;">🎄</span>';
            } else if (mode === 'space') {
                btn.innerHTML = '<span style="font-size: 1.25rem; line-height: 1;">🚀</span>';
            } else {
                let path = '';
                if (mode === 'dark') {
                    path = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
                } else if (mode === 'midnight') {
                    path = '<path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>';
                } else {
                    path = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
                }
                btn.innerHTML = `<svg id="theme-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            // Sidebar generation
            const loList = document.getElementById('lo-list');
            ['LO1', 'LO2', 'LO3', 'LO4', 'LO5', 'LO6', 'revision'].forEach(key => {
                const displayText = key === 'revision' ? 'Revision' : learningObjectives[key].title;
                const listItem = document.createElement('li');
                listItem.innerHTML = `<button id="lo-${key}" class="lo-item w-full text-left p-3 rounded-lg border-l-4 border-tech-dark-alt transition duration-200 hover:bg-tech-primary/10 hover:border-tech-primary font-medium text-sm sm:text-base" data-lo-key="${key}"><span class="truncate">${displayText}</span></button>`;
                loList.appendChild(listItem);
            });
            loList.addEventListener('click', (event) => {
                const button = event.target.closest('.lo-item');
                if (button) { handleNavigationClick(button.getAttribute('data-lo-key')); }
            });
            handleNavigationClick('LO1');
            // Christmas / Language Logic
            const translations = {
                en: { "settings": "Settings", "language": "Language", "theme": "Theme", "close": "Close", "footer_contact": "If you have any comments please text me" },
                ar: { "settings": "الإعدادات", "language": "اللغة", "theme": "السمة", "close": "إغلاق", "footer_contact": "إذا كان لديك أي تعليقات يرجى مراسلتي" }
            };
            function updateText(lang) {
                document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
                document.documentElement.setAttribute('lang', lang);
                const t = translations[lang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) el.textContent = t[key];
                });
            }
            function setLanguage(lang) {
                localStorage.setItem('language', lang);
                updateText(lang);
            }
            function setTheme(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                updateThemeIcon(theme);

                // Use centralized effects
                if (window.ThemeEffects) {
                    window.ThemeEffects.setEffect(theme);
                } else {
                    if (theme === 'christmas') {
                        startSnow();
                    } else {
                        stopSnow();
                    }
                }

                // Anime.js Stagger Effect on Sidebar
                if (window.anime) {
                    const items = document.querySelectorAll('#lo-list li');
                    anime({
                        targets: items,
                        translateX: [-20, 0],
                        opacity: [0, 1],
                        delay: anime.stagger(100),
                        easing: 'easeOutQuad',
                        duration: 800
                    });
                }
            }
            // Snow
            function startSnow() {
                const c = document.getElementById('snow-container'); if (!c) return; stopSnow();
                window.snowInterval = setInterval(() => {
                    const s = document.createElement('div');
                    s.className = 'snowflake';
                    s.style.left = Math.random() * 100 + 'vw';
                    s.style.width = s.style.height = (Math.random() * 5 + 3) + 'px';
                    s.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    s.style.opacity = Math.random();
                    c.appendChild(s);
                    setTimeout(() => s.remove(), 5000);
                }, 100);
            }
            function stopSnow() { if (window.snowInterval) clearInterval(window.snowInterval); const c = document.getElementById('snow-container'); if (c) c.innerHTML = ''; }

            // Init
            setLanguage(localStorage.getItem('language') || 'en');
            const saved = localStorage.getItem('theme');
            if (saved) setTheme(saved); else setTheme('dark');

            // Listeners
            document.getElementById('open-settings')?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('settings-modal').classList.remove('hidden'); });
            document.getElementById('close-settings')?.addEventListener('click', () => document.getElementById('settings-modal').classList.add('hidden'));
            document.getElementById('settings-modal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('settings-modal')) document.getElementById('settings-modal').classList.add('hidden'); });
            document.getElementById('lang-en')?.addEventListener('click', () => setLanguage('en'));
            document.getElementById('lang-ar')?.addEventListener('click', () => setLanguage('ar'));
            document.getElementById('theme-dark')?.addEventListener('click', () => setTheme('dark'));
            document.getElementById('theme-midnight')?.addEventListener('click', () => setTheme('midnight'));
            document.getElementById('theme-christmas')?.addEventListener('click', () => setTheme('christmas'));
            document.getElementById('theme-space')?.addEventListener('click', () => setTheme('space'));

            // Legacy Toggle Listener
            const legacyToggle = document.getElementById('theme-toggle-btn'); // Changed from 'theme-toggle' to 'theme-toggle-btn' to match existing HTML
            if (legacyToggle) legacyToggle.addEventListener('click', () => { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'christmas' : 'dark'); });

        });
    </script>
</head>
