<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Semester - Stemawy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            /* Fallback */
            color: #fff;
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.6) blur(2px);
        }

        /* Glassy Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(51, 255, 204, 0.5);
            box-shadow: 0 20px 50px rgba(51, 255, 204, 0.2);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(51, 255, 204, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            transform: translate(var(--x, 0), var(--y, 0));
            pointer-events: none;
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        /* Text Gradients */
        .gradient-text {
            background: linear-gradient(135deg, #33FFCC 0%, #00BFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            color: #E0E6F0;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(51, 255, 204, 0.2);
            border-color: #33FFCC;
            transform: translateX(-5px);
            color: #fff;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <!-- Background Video -->
    <video autoplay muted loop id="bg-video">
        <source src="../the vedio.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Navigation -->
    <a href="../index.html" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <path d="M12 19l-7-7 7-7" />
        </svg>
        Dashboard
    </a>

    <!-- Main Content -->
    <div class="container mx-auto px-4 z-10">
        <div class="text-center mb-16 opacity-0" id="header-content">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4 tracking-tight">Select Semester</h1>
            <p class="text-xl text-gray-300 font-light max-w-2xl mx-auto">Choose your academic path to access resources
                and materials.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-8 justify-center items-center max-w-5xl mx-auto">

            <!-- First Semester Card -->
            <a href="./first semester/index.html"
                class="glass-card w-full md:w-1/2 p-10 flex flex-col items-center text-center group h-80 justify-center card-entry">
                <div
                    class="w-20 h-20 mb-6 rounded-full bg-white/5 flex items-center justify-center border border-white/10 group-hover:border-[#33FFCC] transition-colors duration-300">
                    <span class="text-4xl">1️⃣</span>
                </div>
                <h2 class="text-4xl font-bold text-white mb-3 group-hover:text-[#33FFCC] transition-colors">First
                    Semester</h2>
                <p class="text-gray-400 group-hover:text-gray-200 transition-colors">Access materials for the start of
                    the year.</p>
            </a>

            <!-- Second Semester Card -->
            <a href="./second semester/index.html"
                class="glass-card w-full md:w-1/2 p-10 flex flex-col items-center text-center group h-80 justify-center card-entry">
                <div
                    class="w-20 h-20 mb-6 rounded-full bg-white/5 flex items-center justify-center border border-white/10 group-hover:border-[#00BFFF] transition-colors duration-300">
                    <span class="text-4xl">2️⃣</span>
                </div>
                <h2 class="text-4xl font-bold text-white mb-3 group-hover:text-[#00BFFF] transition-colors">Second
                    Semester</h2>
                <p class="text-gray-400 group-hover:text-gray-200 transition-colors">continue your journey with term 2
                    resources.</p>
            </a>

        </div>
    </div>

    <script>
        // Entrance Animation
        document.addEventListener('DOMContentLoaded', () => {

            // Animate Header
            anime({
                targets: '#header-content',
                opacity: [0, 1],
                translateY: [-20, 0],
                easing: 'easeOutExpo',
                duration: 1000,
                delay: 200
            });

            // Animate Cards
            anime({
                targets: '.card-entry',
                opacity: [0, 1],
                translateY: [50, 0],
                easing: 'easeOutElastic(1, .6)',
                duration: 1200,
                delay: anime.stagger(200, { start: 500 })
            });

            // Card Hover Mouse Effect
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--x', `${x}px`);
                    card.style.setProperty('--y', `${y}px`);
                });
            });
        });
    </script>
</body>

</html>
